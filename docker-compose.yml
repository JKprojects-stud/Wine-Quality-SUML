services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: wine-quality-backend
    environment:
      - PORT=8008
      - PYTHONPATH=/app
    ports:
      - "8008:8008"
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: wine-quality-frontend
    environment:
      - BACKEND_URL=http://backend:8008
      - PYTHONPATH=/app
    ports:
      - "8501:8501"
    depends_on:
      - backend